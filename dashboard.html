<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MARIACHI HACKS | Dashboard Admin</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Inter:wght@300;400;500;600;700&display=swap">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200">
  <script src="js/supabase.js"></script>
  <script src="js/neon-effects.js"></script>
  <style>
    * { font-family: 'Inter', sans-serif; }
    .glass-card { background: rgba(8,8,14,0.78); border: 1px solid rgba(0,255,102,0.13); backdrop-filter: blur(14px); }
    .btn-primary { background: linear-gradient(135deg,#00ff66,#00bc4c); color:#000; font-weight:800; transition:all .25s; }
    .btn-primary:hover { background: linear-gradient(135deg,#00ff66,#ff003c); color:#fff; transform:translateY(-1px); box-shadow:0 0 25px rgba(0,255,102,0.4); }
    .stat-card { transition: transform 0.2s ease; }
    .stat-card:hover { transform: translateY(-3px); }
    @keyframes fadeInUp { from{opacity:0;transform:translateY(18px)} to{opacity:1;transform:translateY(0)} }
    .animate-in { animation: fadeInUp 0.4s ease both; }
    @keyframes countUp { from{opacity:0;transform:scale(0.7)} to{opacity:1;transform:scale(1)} }
    .count-anim { animation: countUp 0.5s cubic-bezier(0.34,1.56,0.64,1) both; }
  </style>
</head>
<body class="p-4 md:p-8">

<div class="max-w-6xl mx-auto">

  <!-- Header -->
  <header class="flex flex-col sm:flex-row justify-between items-center gap-4 glass-card p-5 rounded-2xl mb-8 animate-in">
    <div class="flex items-center gap-3">
      <div class="w-9 h-9 rounded-xl bg-emerald-950/60 border border-emerald-900/50 flex items-center justify-center">
        <span class="material-symbols-outlined text-lg text-emerald-400">dashboard</span>
      </div>
      <div>
        <h1 class="text-base font-black text-white leading-none" style="font-family:'Syne',sans-serif">MARIACHI PANEL</h1>
        <p class="text-[10px] text-zinc-500 mt-0.5">Consola central de control</p>
      </div>
    </div>
    <div class="flex gap-2">
      <button onclick="location.href='admin-productos.html'" class="btn-primary px-4 py-2 rounded-xl text-xs font-bold uppercase tracking-wider flex items-center gap-1.5">
        <span class="material-symbols-outlined text-sm">inventory_2</span> Productos
      </button>
      <button onclick="location.href='admin-pedidos.html'" class="btn-primary px-4 py-2 rounded-xl text-xs font-bold uppercase tracking-wider flex items-center gap-1.5">
        <span class="material-symbols-outlined text-sm">receipt_long</span> Órdenes
      </button>
      <button onclick="logout()" class="text-xs text-zinc-500 hover:text-red-400 transition px-3 py-2 rounded-xl border border-zinc-800 flex items-center gap-1.5">
        <span class="material-symbols-outlined text-sm">logout</span>
      </button>
    </div>
  </header>

  <!-- Stats -->
  <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-5 mb-8">
    <div class="glass-card stat-card p-6 rounded-2xl text-center animate-in" style="animation-delay:.05s">
      <div class="w-12 h-12 mx-auto rounded-xl bg-emerald-950/60 border border-emerald-900/40 flex items-center justify-center mb-3">
        <span class="material-symbols-outlined text-2xl text-emerald-400">inventory_2</span>
      </div>
      <p class="text-3xl font-black text-white count-anim" id="totalProducts" style="font-family:'Syne',sans-serif">—</p>
      <p class="text-[10px] text-zinc-500 uppercase tracking-widest mt-1">Productos</p>
    </div>
    <div class="glass-card stat-card p-6 rounded-2xl text-center animate-in" style="animation-delay:.1s">
      <div class="w-12 h-12 mx-auto rounded-xl bg-amber-950/60 border border-amber-900/40 flex items-center justify-center mb-3">
        <span class="material-symbols-outlined text-2xl text-amber-400">receipt_long</span>
      </div>
      <p class="text-3xl font-black text-white count-anim" id="totalOrders" style="font-family:'Syne',sans-serif">—</p>
      <p class="text-[10px] text-zinc-500 uppercase tracking-widest mt-1">Órdenes Totales</p>
    </div>
    <div class="glass-card stat-card p-6 rounded-2xl text-center animate-in" style="animation-delay:.15s">
      <div class="w-12 h-12 mx-auto rounded-xl bg-red-950/60 border border-red-900/40 flex items-center justify-center mb-3">
        <span class="material-symbols-outlined text-2xl text-red-400">pending</span>
      </div>
      <p class="text-3xl font-black text-white count-anim" id="pendingOrders" style="font-family:'Syne',sans-serif">—</p>
      <p class="text-[10px] text-zinc-500 uppercase tracking-widest mt-1">Pendientes</p>
    </div>
    <div class="glass-card stat-card p-6 rounded-2xl text-center animate-in" style="animation-delay:.2s">
      <div class="w-12 h-12 mx-auto rounded-xl bg-blue-950/60 border border-blue-900/40 flex items-center justify-center mb-3">
        <span class="material-symbols-outlined text-2xl text-blue-400">payments</span>
      </div>
      <p class="text-3xl font-black text-emerald-400 count-anim" id="totalRevenue" style="font-family:'Syne',sans-serif">—</p>
      <p class="text-[10px] text-zinc-500 uppercase tracking-widest mt-1">Revenue Total</p>
    </div>
  </div>

  <!-- Recent orders preview -->
  <div class="glass-card p-6 rounded-2xl animate-in" style="animation-delay:.25s">
    <div class="flex justify-between items-center mb-5">
      <h2 class="text-sm font-black text-white uppercase tracking-widest" style="font-family:'Syne',sans-serif">Órdenes Recientes</h2>
      <button onclick="location.href='admin-pedidos.html'" class="text-xs text-emerald-400 hover:text-emerald-300 transition font-semibold flex items-center gap-1">
        Ver todas <span class="material-symbols-outlined text-xs">arrow_forward</span>
      </button>
    </div>
    <div id="recentOrders">
      <div class="text-center py-8 text-zinc-600 text-xs">
        <div class="w-5 h-5 border-2 border-emerald-500 border-t-transparent rounded-full animate-spin mx-auto mb-2"></div>
        Cargando...
      </div>
    </div>
  </div>
</div>

<script>
  // Auth check
  window.m7Supabase.auth.getSession().then(({ data: { session } }) => {
    if (!session) location.href = 'login.html';
  });

  async function logout() {
    await window.m7Supabase.auth.signOut();
    location.href = 'login.html';
  }

  async function loadMetrics() {
    const [
      { count: pCount },
      { count: oCount },
      { count: pendCount },
      { data: orders }
    ] = await Promise.all([
      window.m7Supabase.from('products').select('*', { count:'exact', head:true }),
      window.m7Supabase.from('orders').select('*', { count:'exact', head:true }),
      window.m7Supabase.from('orders').select('*', { count:'exact', head:true }).eq('status', 'Pendiente'),
      window.m7Supabase.from('orders').select('total_price, client_name, status, id, client_contact').order('id', { ascending:false }).limit(5)
    ]);

    document.getElementById('totalProducts').textContent = pCount || 0;
    document.getElementById('totalOrders').textContent = oCount || 0;
    document.getElementById('pendingOrders').textContent = pendCount || 0;

    // Revenue calc
    const { data: allOrders } = await window.m7Supabase.from('orders').select('total_price').eq('status','Entregado');
    const revenue = (allOrders || []).reduce((s, o) => s + parseFloat(o.total_price||0), 0);
    document.getElementById('totalRevenue').textContent = `$${revenue.toFixed(0)}`;

    // Recent orders
    const container = document.getElementById('recentOrders');
    if (!orders || !orders.length) {
      container.innerHTML = '<p class="text-center text-zinc-600 text-xs py-4">No hay órdenes aún.</p>';
      return;
    }
    container.innerHTML = orders.map(o => `
      <div class="flex items-center justify-between py-3 border-b border-zinc-900/60 last:border-0">
        <div class="flex items-center gap-3">
          <div class="w-8 h-8 rounded-lg bg-zinc-900 flex items-center justify-center text-[10px] font-mono text-zinc-500">#${o.id}</div>
          <div>
            <p class="text-sm font-bold text-white">${o.client_name}</p>
            <p class="text-[10px] text-zinc-500">${o.client_contact}</p>
          </div>
        </div>
        <div class="flex items-center gap-3">
          <span class="text-[10px] font-bold px-2 py-0.5 rounded-md ${o.status==='Pendiente' ? 'bg-amber-950/60 text-amber-400 border border-amber-900/50' : 'bg-emerald-950/60 text-emerald-400 border border-emerald-900/50'}">${o.status}</span>
          <span class="text-sm font-mono font-bold text-white">$${parseFloat(o.total_price).toFixed(2)}</span>
        </div>
      </div>`).join('');
  }

  loadMetrics();
</script>
</body>
</html>
