<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MARIACHI HACKS | Acceso Admin</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Inter:wght@300;400;500;600;700&display=swap">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200">
  <script src="js/supabase.js"></script>
  <script src="js/neon-effects.js"></script>
  <style>
    * { font-family: 'Inter', sans-serif; }
    .glass-card { background: rgba(8,8,14,0.8); border: 1px solid rgba(0,255,102,0.14); backdrop-filter: blur(14px); }
    .btn-primary { background: linear-gradient(135deg,#00ff66,#00bc4c); color:#000; font-weight:800; transition:all .25s; }
    .btn-primary:hover { background: linear-gradient(135deg,#00ff66,#ff003c); color:#fff; transform:translateY(-1px); box-shadow:0 0 25px rgba(0,255,102,0.4); }
    .btn-primary:disabled { opacity:0.5; transform:none; cursor:not-allowed; }
    input { background: rgba(8,8,14,0.9) !important; border: 1px solid rgba(0,255,102,0.15) !important; color:#f1f5f9 !important; transition: border-color .2s, box-shadow .2s; }
    input:focus { border-color: rgba(0,255,102,0.5) !important; box-shadow: 0 0 0 3px rgba(0,255,102,0.08) !important; outline:none; }
    @keyframes fadeIn { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }
    .card-wrap { animation: fadeIn 0.4s ease both; }
  </style>
</head>
<body class="p-4 min-h-screen flex items-center justify-center">

<div class="w-full max-w-sm card-wrap">
  <div class="glass-card p-8 rounded-3xl">
    <div class="text-center mb-7">
      <div class="w-14 h-14 mx-auto rounded-2xl bg-emerald-950/60 border border-emerald-900/50 flex items-center justify-center mb-4">
        <span class="material-symbols-outlined text-3xl text-emerald-400">terminal</span>
      </div>
      <h1 class="text-xl font-black text-white" style="font-family:'Syne',sans-serif">ACCESO ADMIN</h1>
      <p class="text-zinc-500 text-xs mt-1">Consola interna de control</p>
    </div>

    <form id="loginForm" class="flex flex-col gap-4">
      <div>
        <label class="block text-[10px] uppercase tracking-widest text-zinc-400 font-bold mb-1.5">Email</label>
        <input type="email" id="email" required autocomplete="email"
          class="w-full rounded-xl px-4 py-3 text-sm">
      </div>
      <div>
        <label class="block text-[10px] uppercase tracking-widest text-zinc-400 font-bold mb-1.5">Contraseña</label>
        <div class="relative">
          <input type="password" id="password" required autocomplete="current-password"
            class="w-full rounded-xl px-4 py-3 text-sm pr-10">
          <button type="button" id="togglePwd" class="absolute right-3 top-1/2 -translate-y-1/2 text-zinc-500 hover:text-zinc-300">
            <span class="material-symbols-outlined text-sm">visibility</span>
          </button>
        </div>
      </div>

      <div id="errorMessage" class="text-xs text-red-400 font-semibold bg-red-950/30 border border-red-900/40 p-3 rounded-xl hidden text-center"></div>

      <button type="submit" id="loginBtn" class="btn-primary w-full py-3 rounded-xl text-xs font-bold uppercase tracking-widest mt-1">
        Ingresar a la Consola
      </button>
    </form>

    <p class="text-center mt-5 text-xs text-zinc-600">
      <a href="index.html" class="text-zinc-500 hover:text-emerald-400 transition flex items-center justify-center gap-1">
        <span class="material-symbols-outlined text-xs">arrow_back</span> Volver al catálogo
      </a>
    </p>
  </div>
</div>

<script>
  // Toggle password visibility
  document.getElementById('togglePwd').addEventListener('click', () => {
    const pwd = document.getElementById('password');
    const icon = document.querySelector('#togglePwd span');
    if (pwd.type === 'password') { pwd.type = 'text'; icon.textContent = 'visibility_off'; }
    else { pwd.type = 'password'; icon.textContent = 'visibility'; }
  });

  document.getElementById('loginForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const errorDiv = document.getElementById('errorMessage');
    const btn = document.getElementById('loginBtn');
    errorDiv.classList.add('hidden');
    btn.disabled = true;
    btn.textContent = 'AUTENTICANDO...';

    const { data, error } = await window.m7Supabase.auth.signInWithPassword({
      email: document.getElementById('email').value,
      password: document.getElementById('password').value
    });

    if (error) {
      errorDiv.textContent = '❌ Credenciales incorrectas. Intenta de nuevo.';
      errorDiv.classList.remove('hidden');
      btn.disabled = false;
      btn.textContent = 'Ingresar a la Consola';
      return;
    }
    location.href = 'dashboard.html';
  });
</script>
</body>
</html>
